name: looped-meet

# Shared Infisical config injected into every service (same pattern as the
# monorepo). In production only the bootstrap creds (INFISICAL_CLIENT_ID /
# INFISICAL_CLIENT_SECRET) need to be set on the host — each container pulls
# its own secrets at start via docker-entrypoint.sh. Locally, leave them
# unset and everything runs off the root .env instead (per-service env_file).
x-infisical: &infisical
  INFISICAL_API_URL: ${INFISICAL_API_URL:-https://infisical.looped.sh/api}
  INFISICAL_ENV: ${INFISICAL_ENV:-prod}
  INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-396f8208-593a-4966-8943-97621affc25a}
  INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
  INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}

# Local-dev fallback: without Infisical creds, secrets come from the root
# .env. Compose only warns if the file is missing.
x-local-env: &local-env
  env_file:
    - path: .env
      required: false

# Images are built by GitHub Actions and pulled from GHCR — never built on the
# deploy host. For local from-source builds, layer in the build override:
#   docker compose -f docker-compose.yaml -f docker-compose.build.yaml up --build
services:
  livekit:
    image: ghcr.io/loopedautomation/meet-livekit:${IMAGE_TAG:-latest}
    pull_policy: always
    <<: *local-env
    # Config is templated from .env — no separate livekit.yaml to keep in sync.
    # Production: set LIVEKIT_NODE_IP to the host's public IP (pinned, not
    # STUN-discovered: discovery behind Docker NAT yields random-port
    # candidates and ICE flaps). Local dev sets 127.0.0.1 via .env.
    # In production the keys below interpolate empty — livekit-server instead
    # reads LIVEKIT_KEYS ("<key>: <secret>") pulled from Infisical, which
    # takes precedence over the config's keys section.
    environment:
      <<: *infisical
      INFISICAL_SECRETS_PATH: "/apps/livekit /shared"
      LIVEKIT_CONFIG: |
        port: 7880
        rtc:
          tcp_port: 7881
          # Single muxed UDP port instead of a port range: through Docker's
          # bridge/userland proxy a per-session range makes ICE pairs flap
          # (clients reconnect every ~15s); one muxed port is the
          # docker-friendly setup LiveKit documents.
          udp_port: 7882
          use_external_ip: ${LIVEKIT_USE_EXTERNAL_IP:-false}
          node_ip: ${LIVEKIT_NODE_IP:-}
          # Docker Desktop's UDP proxy is unreliable for WebRTC on macOS —
          # TCP-only media is rock solid for local dev. Set false in production.
          force_tcp: ${LIVEKIT_FORCE_TCP:-false}
        keys:
          ${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-}
        logging:
          level: info
    ports:
      - "7880:7880"
      - "7881:7881"
      # Must match rtc.udp_port above
      - "7882:7882/udp"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  web:
    image: ghcr.io/loopedautomation/meet-web:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "3000:3000"
    <<: *local-env
    # All app config and secrets come from Infisical in production, or from
    # the root .env locally — never set them here, or they'd shadow the
    # injected values.
    environment:
      <<: *infisical
      INFISICAL_SECRETS_PATH: "/apps/web /shared"
    depends_on:
      livekit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  agent-bridge:
    image: ghcr.io/loopedautomation/meet-agent-bridge:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "8090:8090"
    <<: *local-env
    # All app config and secrets come from Infisical in production, or from
    # the root .env locally. AGENTS_CONFIG is set in the image — it points at
    # a path baked into it.
    environment:
      <<: *infisical
      INFISICAL_SECRETS_PATH: "/apps/agent-bridge /shared"
    depends_on:
      livekit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:8090/health').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  demo-agent:
    # Requires agent-framework >= 0.9 (tty trigger)
    image: ghcr.io/loopedautomation/meet-demo-agent:${IMAGE_TAG:-latest}
    pull_policy: always
    volumes:
      - demo-agent-data:/data
    <<: *local-env
    # Secrets (ANTHROPIC_API_KEY, SCOUT_TTY_TOKEN) come from Infisical in
    # production, or from the root .env locally.
    environment:
      <<: *infisical
      INFISICAL_SECRETS_PATH: "/apps/demo-agent /shared"
    expose:
      - "8300"
    restart: unless-stopped

volumes:
  demo-agent-data:

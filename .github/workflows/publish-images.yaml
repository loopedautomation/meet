name: Publish Images

# Build every service image on GitHub-hosted runners and push to GitHub
# Container Registry (ghcr.io/loopedautomation/meet-<service>), so the
# prod box never builds — its compose only pulls (see docker-compose.yaml).
#
# Triggers:
#   - push to `main`                 -> rolling :latest image
#   - version tag push (e.g. v0.1.0) -> pinned :<version> image
#   - manual dispatch
# Every image also gets a :sha-<short> tag for traceability.

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish ${{ matrix.service }}
    # Self-hosted looped build runners (same fleet as the monorepo) — saves
    # Actions minutes and keeps a persistent layer cache between runs. The
    # repo must be allowed in the org's runner group.
    runs-on: [self-hosted, looped-build]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: apps/web/Dockerfile
          - service: agent-bridge
            dockerfile: apps/agent-bridge/Dockerfile
          - service: livekit
            dockerfile: docker/livekit.Dockerfile
          - service: demo-agent
            dockerfile: examples/demo-agent/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # Isolate the Docker auth config per matrix job: concurrent jobs share
      # ~/.docker/config.json on a self-hosted runner, and a finishing job's
      # logout would wipe credentials an in-flight job needs at push time.
      - name: Isolate Docker auth config
        run: echo "DOCKER_CONFIG=${RUNNER_TEMP}/.docker-${{ matrix.service }}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Persistent buildx builder: BuildKit keeps its layer cache in this
      # builder across runs, so no slow GHA cache export/import. Same builder
      # name and GC cap as the monorepo's runners.
      - name: Use persistent buildx builder
        run: |
          docker buildx create --name looped-build --driver docker-container \
            --driver-opt env.BUILDKIT_GC_RESERVED_SPACE=10gb \
            --bootstrap 2>/dev/null || true
          docker buildx use looped-build

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/meet-${{ matrix.service }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # No cache-to/from: the persistent builder keeps layers locally.

  # Tell Coolify to redeploy once ALL images are published, so it pulls the
  # freshly-pushed images instead of racing the build on git push. No-ops
  # until the COOLIFY_DEPLOY_WEBHOOK secret is set.
  deploy:
    name: Trigger Coolify deploy
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, looped-build]
    steps:
      - name: Trigger Coolify redeploy
        env:
          WEBHOOK: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No COOLIFY_DEPLOY_WEBHOOK secret set — skipping deploy trigger."
            exit 0
          fi
          curl -fsSL -X GET "$WEBHOOK" ${COOLIFY_TOKEN:+-H "Authorization: Bearer $COOLIFY_TOKEN"}
          echo "Triggered Coolify deploy."

# Production overlay: TLS via Caddy, public domains, external-IP RTC.
#
#   cp .env.example .env   # set secrets, keys, and (optionally) domains
#   docker compose -f docker-compose.yaml -f docker-compose.prod.yaml up -d --build
#
# DNS: point MEET_DOMAIN, LK_DOMAIN (and MEET_ALIAS_DOMAIN) at this host.
# Open: 80/tcp, 443/tcp (Caddy), 7881/tcp and 51000-51100/udp (LiveKit media).

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      MEET_DOMAIN: ${MEET_DOMAIN:-meet.lpd.sh}
      LK_DOMAIN: ${LK_DOMAIN:-lk.lpd.sh}
      MEET_ALIAS_DOMAIN: ${MEET_ALIAS_DOMAIN:-meet.looped.sh}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - web
      - livekit
    restart: unless-stopped

  livekit:
    volumes:
      - ./livekit.prod.yaml:/etc/livekit.yaml:ro
    # Signaling goes through Caddy; only media ports stay on the host.
    ports: !override
      - "7881:7881"
      - "51000-51100:51000-51100/udp"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: wss://${LK_DOMAIN:-lk.lpd.sh}
    environment:
      NEXT_PUBLIC_LIVEKIT_URL: wss://${LK_DOMAIN:-lk.lpd.sh}
    # Only reachable through Caddy.
    ports: !override []

  agent-bridge:
    # Internal only — the web app reaches it over the compose network.
    ports: !override []

volumes:
  caddy-data:
  caddy-config:

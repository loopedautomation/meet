# Agents available to invite into meetings.
# Baked into the agent-bridge image at build time; each `brain` points at a running
# looped-af agent's TTY trigger (or webhook).
agents:
  - id: scout
    name: Scout
    description: A general-purpose research assistant that can look things up mid-meeting.
    greeting: "Hi, I'm Scout. Ask me anything — I can look things up while we talk."
    brain:
      kind: tty
      url: ws://demo-agent:8300/tty
      token_env: SCOUT_TTY_TOKEN
    # Speech-to-speech interaction layer; tool work is delegated to the brain.
    realtime:
      model: gpt-realtime-2.1
      voice: marin
    # Fallback pipeline config (used only if `realtime` is removed).
    stt:
      provider: openai
      model: gpt-4o-mini-transcribe
    tts:
      provider: openai
      model: gpt-4o-mini-tts
      voice: alloy

  # Pipeline-mode demo: STT -> looped-af brain -> ElevenLabs TTS. No realtime
  # block, so this agent only spends tokens when addressed — the cheap mode.
  - id: echo
    name: Echo
    description: Pipeline-mode twin of Scout — same brain, ElevenLabs voice, pay-per-turn.
    greeting: "Hi, I'm Echo. Same brain as Scout, cheaper habits."
    brain:
      kind: tty
      url: ws://demo-agent:8300/tty
      token_env: SCOUT_TTY_TOKEN
    stt:
      provider: openai
      model: gpt-4o-mini-transcribe
    tts:
      provider: elevenlabs
      model: eleven_turbo_v2_5
      voice: 21m00Tcm4TlvDq8ikWAM # "Rachel"
